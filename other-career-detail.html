<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기타 경력 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5f5f5;
      --surface2: #ebebeb;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.16);
      --text: #111111;
      --text2: #6b6b6b;
      --text3: #bbbbbb;
      --accent: #4F46E5;
      --accent-l: rgba(79,70,229,0.08);
      --accent-h: #3730a3;
      --green: #059669;
      --orange: #D97706;
      --teal: #0891B2;
      --r: 10px;
      --r-sm: 6px;
      --t: 0.22s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 0.5px solid var(--border);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .nav-logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -.02em;
      cursor: pointer;
      transition: opacity var(--t);
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo:hover { opacity: .55; }

    .nav-links {
      display: flex;
      gap: 28px;
    }

    .nav-link {
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: color var(--t);
      letter-spacing: .01em;
      text-decoration: none;
    }

    .nav-link:hover {
      color: var(--text);
      font-weight: 500;
    }

    /* LAYOUT */
    main {
      padding-top: 52px;
    }

    .w {
      max-width: 720px;
      margin: 0 auto;
      padding: 52px 24px 100px;
    }

    .tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 12px;
    }

    .block .tag {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .02em;
      text-transform: none;
      color: var(--text2);
    }

    .divider {
      height: .5px;
      background: var(--border);
      margin: 48px 0;
    }

    .block {
      margin-bottom: 40px;
    }

    h2 {
      font-size: clamp(22px, 3.5vw, 28px);
      font-weight: 700;
      letter-spacing: -.025em;
      line-height: 1.25;
    }

    .sub {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.75;
      margin-top: 14px;
    }

    /* BACK */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      margin-bottom: 24px;
      transition: color var(--t);
      text-decoration: none;
    }

    .back:hover { color: var(--text); }

    /* PROJECT BLOCK */
    .oexp-project {
      padding-top: 32px;
    }

    .oexp-project + .oexp-project {
      border-top: .5px solid var(--border);
      margin-top: 32px;
    }

    .oexp-project-title {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -.01em;
      margin-bottom: 4px;
    }

    .oexp-project-period {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 14px;
    }

    .oexp-project-body {
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    /* TOC */
    .ocd-toc {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 0;
      padding: 20px 0;
      border-bottom: .5px solid var(--border);
    }

    .ocd-toc-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .ocd-toc-item {
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      transition: color var(--t);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .ocd-toc-item::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .ocd-toc-item:hover { color: var(--green); }

    /* REF LINKS */
    .ref-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .ref-card {
      display: flex;
      align-items: stretch;
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      transition: background var(--t);
      text-decoration: none;
    }

    .ref-card:hover { background: var(--surface); }

    .ref-body {
      flex: 1;
      padding: 14px 16px;
      min-width: 0;
    }

    .ref-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ref-desc {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .ref-url {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ref-thumb {
      width: 80px;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
    }

    /* PDF PREVIEW MODAL */
    .ppdf-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }

    .ppdf-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .ppdf-modal {
      background: #fff;
      width: min(860px, calc(100vw - 32px));
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .ppdf-modal-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: .5px solid var(--border);
      flex-shrink: 0;
    }

    .ppdf-modal-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .ppdf-modal-close {
      background: none;
      border: none;
      font-size: 18px;
      color: var(--text2);
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color var(--t);
    }

    .ppdf-modal-close:hover { color: var(--text); }

    .ppdf-iframe {
      width: 100%;
      height: 70vh;
      border: none;
      display: block;
      background: #fff;
    }

    .ppdf-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 14px 16px;
      cursor: pointer;
      transition: background var(--t);
    }

    .ppdf-card:hover { background: var(--surface); }

    .ppdf-icon {
      font-size: 24px;
      flex-shrink: 0;
      line-height: 1;
    }

    .ppdf-card-body {
      flex: 1;
      min-width: 0;
    }

    .ppdf-card-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ppdf-card-hint {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    /* GALLERY */
    .gallery-block { margin-bottom: 0; }

    .gallery-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: var(--r-sm);
      cursor: zoom-in;
    }

    .gallery-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: start;
    }

    .gallery-three-col {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      align-items: start;
    }

    .gallery-mixed-top .gallery-img { margin-bottom: 8px; }

    .gallery-mixed-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: start;
    }

    .gallery-block-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .gallery-img-wrap { position: relative; }

    .gallery-img-caption {
      font-size: 12px;
      color: var(--text3);
      margin-top: 5px;
      text-align: left;
      line-height: 1.5;
    }

    /* SLIDE */
    .gallery-slide {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: var(--r-sm);
    }

    .gallery-slide-track {
      display: flex;
      transition: transform .35s ease;
    }

    .gallery-slide-track .gallery-slide-item {
      width: 100%;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .gallery-slide-track .gallery-slide-item .gallery-img {
      width: 100%;
      height: auto;
      border-radius: 0;
      cursor: zoom-in;
      display: block;
    }

    .gallery-slide-caption {
      font-size: 12px;
      color: var(--text3);
      text-align: left;
      line-height: 1.5;
      height: 40px;
      padding-top: 6px;
      overflow: hidden;
    }

    .gallery-slide-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.38);
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background .15s;
      line-height: 1;
    }

    .gallery-slide-btn:hover { background: rgba(0,0,0,0.6); }
    .gallery-slide-btn.prev { left: 10px; }
    .gallery-slide-btn.next { right: 10px; }

    .gallery-slide-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
    }

    .gallery-slide-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border2);
      cursor: pointer;
      transition: background .2s;
    }

    .gallery-slide-dot.on { background: var(--green); }

    /* SLIDE MODAL (full-screen) */
    .slb-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }

    .slb-overlay.open { opacity: 1; pointer-events: auto; }

    .slb-img-wrap {
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slb-img-wrap img {
      max-width: 90vw;
      max-height: 90vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      box-shadow: 0 8px 48px rgba(0,0,0,.6);
    }

    .slb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,.12);
      border: none;
      color: #fff;
      font-size: 22px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9001;
      line-height: 1;
    }

    .slb-close:hover { background: rgba(255,255,255,.25); }

    .slb-counter {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.7);
      letter-spacing: .04em;
      z-index: 9001;
      pointer-events: none;
    }

    .slb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.12);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9001;
      line-height: 1;
    }

    .slb-nav:hover { background: rgba(255,255,255,.28); }
    .slb-nav.prev { left: 20px; }
    .slb-nav.next { right: 20px; }

    /* LIGHTBOX */
    .lb-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }

    .lb-overlay.open { opacity: 1; pointer-events: auto; }

    .lb-img-wrap {
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-img-wrap img {
      max-width: 90vw;
      max-height: 90vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 6px;
      display: block;
      box-shadow: 0 8px 48px rgba(0,0,0,.6);
    }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,.12);
      border: none;
      color: #fff;
      font-size: 22px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      line-height: 1;
    }

    .lb-close:hover { background: rgba(255,255,255,.25); }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      font-size: 14px;
      color: var(--text3);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px 0;
      font-size: 11px;
      color: var(--text3);
      border-top: .5px solid var(--border);
    }

    /* RESPONSIVE */
    @media(max-width:767px) {
      nav { padding: 0 16px; }
      .nav-links { gap: 16px; }
      .nav-link { font-size: 12px; }
      .w { padding: 32px 16px 80px; }
      .divider { margin: 32px 0; }
      .block { margin-bottom: 28px; }
      .sub { font-size: 13px; margin-top: 10px; }
      .gallery-two-col { grid-template-columns: 1fr 1fr; }
      .gallery-three-col { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html" id="nav-logo">포트폴리오</a>
    <div class="nav-links">
      <a class="nav-link" href="index.html#work">Work</a>
      <a class="nav-link" href="index.html#insights">Insights</a>
      <a class="nav-link" href="index.html#contact">Contact</a>
    </div>
  </nav>

  <main>
    <div class="w" id="page-content">
      <div class="loading">불러오는 중…</div>
    </div>
  </main>

  <footer id="page-footer" style="display:none">
    <span id="footer-name"></span>
  </footer>

  <!-- PDF PREVIEW MODAL -->
  <div class="ppdf-overlay" id="ppdf-overlay" onclick="ppdfClose(event)">
    <div class="ppdf-modal">
      <div class="ppdf-modal-hd">
        <span class="ppdf-modal-title" id="ppdf-title"></span>
        <button class="ppdf-modal-close" onclick="ppdfClose()" aria-label="닫기">✕</button>
      </div>
      <iframe class="ppdf-iframe" id="ppdf-iframe" src="" allow="autoplay" allowfullscreen></iframe>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lb-overlay" id="lb-overlay" onclick="lbClose(event)">
    <button class="lb-close" onclick="lbClose()" aria-label="닫기">✕</button>
    <div class="lb-img-wrap"><img id="lb-img" src="" alt=""></div>
  </div>

  <!-- SLIDE MODAL -->
  <div class="slb-overlay" id="slb-overlay" onclick="slideModalClose(event)">
    <button class="slb-close" onclick="slideModalClose()" aria-label="닫기">✕</button>
    <button class="slb-nav prev" id="slb-prev" onclick="slideModalStep(-1)">&#8249;</button>
    <div class="slb-img-wrap"><img id="slb-img" src="" alt=""></div>
    <button class="slb-nav next" id="slb-next" onclick="slideModalStep(1)">&#8250;</button>
    <div class="slb-counter" id="slb-counter"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    firebase.initializeApp(FIREBASE_CONFIG);
    var _db = firebase.firestore();

    // ── HELPERS ───────────────────────────────────────────────────────────────
    const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function sarHtml(raw) {
      if (!raw) return '';
      var PASS_TAG = new RegExp('<(\\/?(?:u|strong|em|br\\s*\\/?)\\s*)>', 'gi');
      var saved = [];
      var t = String(raw).replace(PASS_TAG, function (m) {
        saved.push(m);
        return '\x00T' + (saved.length - 1) + '\x00';
      });
      t = t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      t = t.split('\n').map(function (line) {
        return line.replace(/^( +)/, function (m) {
          return m.replace(/ /g, '&nbsp;');
        });
      }).join('<br>');
      t = t.replace(/( {2,})/g, function (m) { return m.replace(/ /g, '&nbsp;'); });
      t = t.replace(/==(.*?)==/g, '<mark style="background:#10b981;color:#fff;padding:1px 5px;border-radius:3px;font-weight:500">$1</mark>');
      t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      t = t.replace(/_(.*?)_/g, '<em>$1</em>');
      t = t.replace(/\x00T(\d+)\x00/g, function (_, i) { return saved[+i]; });
      return t;
    }

    // ── LIGHTBOX ─────────────────────────────────────────────────────────────
    function lbOpen(src, alt) {
      const ov = document.getElementById('lb-overlay');
      document.body.appendChild(ov);
      document.getElementById('lb-img').src = src;
      document.getElementById('lb-img').alt = alt || '';
      void ov.offsetHeight;
      ov.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function lbClose(e) {
      if (e && e.target === document.getElementById('lb-img')) return;
      const ov = document.getElementById('lb-overlay');
      ov.classList.remove('open');
      const anyOpen = ['ppdf-overlay'].some(id => document.getElementById(id).classList.contains('open'));
      if (!anyOpen) document.body.style.overflow = '';
      setTimeout(() => { document.getElementById('lb-img').src = ''; }, 220);
    }

    // ── FILE PREVIEW MODAL ───────────────────────────────────────────────────
    function getDrivePreviewUrl(url) {
      if (!url) return '';
      const regExp = /\/file\/d\/([a-zA-Z0-9_-]+)|id=([a-zA-Z0-9_-]+)/;
      const match = url.match(regExp);
      const id = match ? (match[1] || match[2]) : null;
      return id ? `https://drive.google.com/file/d/${id}/preview` : url;
    }

    function ppdfOpen(url, name) {
      document.getElementById('ppdf-title').textContent = name;
      document.getElementById('ppdf-iframe').src = getDrivePreviewUrl(url);
      document.getElementById('ppdf-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function ppdfClose(e) {
      if (e && e.target !== document.getElementById('ppdf-overlay')) return;
      document.getElementById('ppdf-overlay').classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { document.getElementById('ppdf-iframe').src = ''; }, 220);
    }

    // ── SLIDE MODAL ───────────────────────────────────────────────────────────
    let _slbId = null, _slbIdx = 0, _slbSrcs = [];
    function slideModalOpen(id, idx) {
      const el = document.getElementById(id);
      if (!el) return;
      const imgs = el.querySelectorAll('.gallery-slide-item img');
      _slbId = id;
      _slbSrcs = Array.from(imgs).map(img => ({ src: img.src, alt: img.alt }));
      _slbIdx = idx;
      _slbUpdate();
      document.getElementById('slb-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function _slbUpdate() {
      const item = _slbSrcs[_slbIdx];
      if (!item) return;
      document.getElementById('slb-img').src = item.src;
      document.getElementById('slb-img').alt = item.alt || '';
      document.getElementById('slb-counter').textContent = _slbSrcs.length > 1 ? `${_slbIdx + 1} / ${_slbSrcs.length}` : '';
      document.getElementById('slb-prev').style.display = _slbSrcs.length > 1 ? '' : 'none';
      document.getElementById('slb-next').style.display = _slbSrcs.length > 1 ? '' : 'none';
    }

    function slideModalStep(dir) {
      _slbIdx = (_slbIdx + dir + _slbSrcs.length) % _slbSrcs.length;
      _slbUpdate();
    }

    function slideModalClose(e) {
      if (e && e.target === document.getElementById('slb-img')) return;
      document.getElementById('slb-overlay').classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { document.getElementById('slb-img').src = ''; }, 220);
    }

    // ── GALLERY ───────────────────────────────────────────────────────────────
    let _slideIdx = {};
    let _slideCount = 0;
    const _slideCaptions = {};

    function imgTag(img) {
      const caption = img.caption ? `<div class="gallery-img-caption">${esc(img.caption)}</div>` : '';
      return `<div class="gallery-img-wrap"><img class="gallery-img" src="${esc(img.src)}" alt="${esc(img.alt || '')}" onclick="lbOpen('${esc(img.src)}','${esc(img.alt || '')}')" loading="lazy">${caption}</div>`;
    }

    function renderSlide(imgs) {
      const id = 'slide-' + (_slideCount++);
      _slideCaptions[id] = imgs.map(img => img.caption || '');
      const items = imgs.map((img, i) =>
        `<div class="gallery-slide-item"><img class="gallery-img" src="${esc(img.src)}" alt="${esc(img.alt || '')}" loading="lazy" onclick="slideModalOpen('${id}',${i})"></div>`
      ).join('');
      const dots = imgs.map((_, i) => `<span class="gallery-slide-dot${i === 0 ? ' on' : ''}" onclick="slideTo('${id}',${i})"></span>`).join('');
      const firstCaption = imgs[0] && imgs[0].caption ? imgs[0].caption : '';
      return `<div class="gallery-slide" id="${id}">
    <div class="gallery-slide-track">${items}</div>
    ${imgs.length > 1 ? `<button class="gallery-slide-btn prev" onclick="slideStep('${id}',-1)">&#8249;</button><button class="gallery-slide-btn next" onclick="slideStep('${id}',1)">&#8250;</button>` : ''}
  </div>
  ${imgs.length > 1 ? `<div class="gallery-slide-dots" id="${id}-dots">${dots}</div>` : ''}
  <div class="gallery-slide-caption" id="${id}-caption">${esc(firstCaption)}</div>`;
    }

    function slideTo(id, idx) {
      const el = document.getElementById(id);
      if (!el) return;
      const track = el.querySelector('.gallery-slide-track');
      const total = track.children.length;
      idx = (idx + total) % total;
      _slideIdx[id] = idx;
      track.style.transform = `translateX(-${idx * 100}%)`;
      const dotsEl = document.getElementById(id + '-dots');
      if (dotsEl) dotsEl.querySelectorAll('.gallery-slide-dot').forEach((d, i) => d.classList.toggle('on', i === idx));
      const captionEl = document.getElementById(id + '-caption');
      if (captionEl) captionEl.textContent = (_slideCaptions[id] || [])[idx] || '';
    }

    function slideStep(id, dir) {
      slideTo(id, (_slideIdx[id] || 0) + dir);
    }

    function renderGallery(gallery) {
      if (!gallery || !gallery.length) return '';
      return gallery.map(block => {
        const imgs = (block.images || []).filter(img => img.src);
        if (!imgs.length) return '';
        const layout = block.layout || 'wide';
        const titleHtml = block.title ? `<div class="gallery-block-title">${esc(block.title)}</div>` : '';
        let inner = '';
        if (layout === 'wide') {
          inner = `<div class="gallery-wide">${imgTag(imgs[0])}</div>`;
        } else if (layout === 'two-col') {
          inner = `<div class="gallery-two-col">${imgs.slice(0, 2).map(imgTag).join('')}</div>`;
        } else if (layout === 'three-col') {
          inner = `<div class="gallery-three-col">${imgs.slice(0, 3).map(imgTag).join('')}</div>`;
        } else if (layout === 'mixed') {
          inner = `<div class="gallery-mixed-top">${imgTag(imgs[0])}</div>
                   <div class="gallery-mixed-bottom">${imgs.slice(1, 3).map(imgTag).join('')}</div>`;
        } else if (layout === 'slide') {
          inner = renderSlide(imgs);
        }
        return `<div class="block gallery-block">${titleHtml}${inner}</div>`;
      }).join('');
    }

    // ── KEYBOARD ─────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        ppdfClose(); lbClose(); slideModalClose();
      }
      if (document.getElementById('slb-overlay').classList.contains('open')) {
        if (e.key === 'ArrowLeft') slideModalStep(-1);
        if (e.key === 'ArrowRight') slideModalStep(1);
      }
    });

    // ── RENDER ────────────────────────────────────────────────────────────────
    function renderProject(p, i) {
      const bodyHtml = p.body ? `<div class="oexp-project-body">${sarHtml(p.body)}</div>` : '';
      const galleryHtml = (p.gallery && p.gallery.length) ? renderGallery(p.gallery) : '';
      const refs = (p.links || []).filter(l => l.url && l.title);
      const linksHtml = refs.length ? `
        <div style="margin-top:16px;">
          <div class="tag" style="font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.02em;text-transform:none;margin-bottom:6px;">관련 링크</div>
          <div class="ref-list">
            ${refs.map(l => `
            <a class="ref-card" href="${esc(l.url)}" target="_blank" rel="noopener">
              <div class="ref-body">
                <div class="ref-title">${esc(l.title)}</div>
                ${l.desc ? `<div class="ref-desc">${esc(l.desc)}</div>` : ''}
                <div class="ref-url">${esc(l.url)}</div>
              </div>
              ${l.thumb ? `<img class="ref-thumb" src="${esc(l.thumb)}" alt="">` : ''}
            </a>`).join('')}
          </div>
        </div>` : '';
      const gallerySection = galleryHtml.trim() ? `<div style="margin-top:16px;">${galleryHtml}</div>` : '';
      const pdfs = p.pdfs && p.pdfs.length ? p.pdfs
        : p.pdf ? [{ url: p.pdf, name: p.pdfName || 'PDF 파일' }] : [];
      const pdfHtml = pdfs.length ? `
        <div style="margin-top:16px;">
          <div class="tag" style="font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.02em;text-transform:none;margin-bottom:6px;">관련 파일</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${pdfs.map(f => `
            <div class="ppdf-card" onclick="ppdfOpen('${esc(f.url)}','${esc(f.name || 'PDF 파일')}')">
              <div class="ppdf-icon">📄</div>
              <div class="ppdf-card-body">
                <div class="ppdf-card-name">${esc(f.name || 'PDF 파일')}</div>
                ${f.desc ? `<div class="ref-desc" style="-webkit-line-clamp:unset;">${esc(f.desc)}</div>` : ''}
                <div class="ppdf-card-hint">클릭해서 미리보기</div>
              </div>
            </div>`).join('')}
          </div>
        </div>` : '';
      return `<div class="oexp-project" id="ocd-p-${i}">
        ${p.name ? `<div class="oexp-project-title">${esc(p.name)}</div>` : ''}
        ${p.period ? `<div class="oexp-project-period">${esc(p.period)}</div>` : ''}
        ${bodyHtml}${gallerySection}${linksHtml}${pdfHtml}
      </div>`;
    }

    function scrollToProject(idx) {
      const target = document.getElementById(`ocd-p-${idx}`);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderPage(career, siteName) {
      const projects = career.projects || [{
        name: '', period: career.period || '', body: career.body || '',
        gallery: career.gallery || [], links: career.links || [], pdfs: career.pdfs || []
      }];

      const namedProjects = projects.filter(p => p.name);
      const tocHtml = namedProjects.length > 1 ? `
        <div class="ocd-toc">
          <div class="ocd-toc-label">프로젝트 목차</div>
          ${projects.map((p, i) => p.name
            ? `<span class="ocd-toc-item" onclick="scrollToProject(${i})">${esc(p.name)}</span>`
            : ''
          ).join('')}
        </div>` : '';

      document.getElementById('page-content').innerHTML = `
        <a class="back" href="index.html#contact">← Contact</a>
        <div class="tag">기타 경력</div>
        <h2>${esc(career.title || '')}</h2>
        ${career.desc ? `<p class="sub">${esc(career.desc)}</p>` : ''}
        <div class="divider"></div>
        ${tocHtml}
        ${projects.map(renderProject).join('')}
      `;

      // Update nav logo & footer with site name
      if (siteName) {
        document.getElementById('nav-logo').textContent = siteName;
        document.getElementById('footer-name').textContent = siteName;
        document.title = `${career.title || '기타 경력'} | ${siteName}`;
      } else {
        document.title = career.title || '기타 경력';
      }

      document.getElementById('page-footer').style.display = '';
    }

    // ── INIT ─────────────────────────────────────────────────────────────────
    (async function () {
      const params = new URLSearchParams(location.search);
      const id = parseInt(params.get('id'), 10);

      if (isNaN(id)) {
        document.getElementById('page-content').innerHTML = '<div class="loading">잘못된 접근입니다.</div>';
        return;
      }

      try {
        const snap = await _db.collection('portfolio').doc('main').get();
        const data = snap.exists ? snap.data() : null;
        const career = data && data.contact && data.contact.prevCareers
          ? data.contact.prevCareers[id]
          : null;

        if (!career) {
          document.getElementById('page-content').innerHTML = '<div class="loading">해당 경력을 찾을 수 없습니다.</div>';
          return;
        }

        renderPage(career, data.name || '');
      } catch (err) {
        console.error(err);
        document.getElementById('page-content').innerHTML = '<div class="loading">데이터를 불러오는 데 실패했습니다.</div>';
      }
    })();
  </script>
</body>
</html>
