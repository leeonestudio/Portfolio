<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김규수 — 콘텐츠로 매출을 만드는 마케터</title>
<meta name="description" content="광고비 없이 유튜브 오가닉 콘텐츠만으로 자사몰 연매출 2.3배 성장을 이끈 콘텐츠 마케터 김규수의 포트폴리오">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--surface:#f5f5f5;--surface2:#ebebeb;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.16);
  --text:#111111;--text2:#6b6b6b;--text3:#bbbbbb;
  --accent:#4F46E5;--accent-l:rgba(79,70,229,0.08);--accent-h:#3730a3;
  --green:#059669;--orange:#D97706;--teal:#0891B2;
  --r:10px;--r-sm:6px;--t:0.22s ease;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Inter',sans-serif;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.nav-logo{font-size:14px;font-weight:700;letter-spacing:-.02em;cursor:pointer;transition:opacity var(--t);}
.nav-logo:hover{opacity:.55}
.nav-links{display:flex;gap:28px;}
.nav-link{font-size:13px;color:var(--text2);cursor:pointer;transition:color var(--t);letter-spacing:.01em;}
.nav-link:hover,.nav-link.on{color:var(--text);font-weight:500;}

/* PAGES */
main{padding-top:52px;}
.page{display:none;min-height:calc(100vh - 52px);}
.page.on{display:block;animation:fadein .3s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* LAYOUT */
.w{max-width:720px;margin:0 auto;padding:52px 24px 100px;}
.tag{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.block .tag{font-size:14px;font-weight:600;letter-spacing:.02em;text-transform:none;color:var(--text2);}
.divider{height:.5px;background:var(--border);margin:48px 0;}
.block{margin-bottom:40px;}

/* TYPOGRAPHY */
h1{font-size:clamp(30px,5vw,44px);font-weight:700;letter-spacing:-.035em;line-height:1.18;}
h2{font-size:clamp(22px,3.5vw,28px);font-weight:700;letter-spacing:-.025em;line-height:1.25;}
.sub{font-size:14px;color:var(--text2);line-height:1.75;margin-top:14px;}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:22px;}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:34px;}
.mc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:20px 14px;text-align:center;transition:border-color var(--t);}
.mc:hover{border-color:var(--border2);}
.mn{font-family:'Inter',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:6px;}
.ml{font-size:13px;color:var(--text2);}

/* BTNS */
.row{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:10px 22px;border-radius:var(--r-sm);cursor:pointer;border:none;font-family:inherit;transition:all var(--t);}
.btn-p{background:var(--accent);color:#fff;}
.btn-p:hover{background:var(--accent-h);}
.btn-o{background:transparent;color:var(--text);border:.5px solid var(--border2);}
.btn-o:hover{border-color:var(--text2);}

/* CASE CARDS */
.case-list{display:flex;flex-direction:column;gap:10px;margin-top:28px;}
.cc{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:20px 20px 18px;cursor:pointer;display:grid;grid-template-columns:1fr 140px;grid-template-rows:auto auto auto;gap:0 20px;transition:all var(--t);}
.cc:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px);}
.cc-num{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--text3);grid-column:1;grid-row:1;align-self:start;margin-bottom:2px;}
.cc-title{font-size:15px;font-weight:600;color:var(--text);grid-column:1;grid-row:2;align-self:center;}
.cc-kpi{font-family:'Inter',sans-serif;font-size:32px;font-weight:700;color:#10b981;grid-column:2;grid-row:2;align-self:center;text-align:right;white-space:nowrap;}
.cc-sub{font-size:12px;color:var(--text2);grid-column:1;grid-row:3;align-self:end;margin-top:6px;}
.cc-more{grid-column:2;grid-row:3;align-self:end;justify-self:end;display:inline-block;white-space:nowrap;font-size:11px;font-weight:500;color:#fff;background:#6b6b6b;border-radius:20px;padding:4px 14px;margin-top:8px;}

/* TIMELINE */
.tl{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:14px;padding:16px 0;border-bottom:.5px solid var(--border);}
.tl-item:last-child{border-bottom:none;}
.tl-yr{font-family:'Inter',sans-serif;font-size:11px;color:var(--text3);min-width:76px;padding-top:3px;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;margin-top:4px;}
.tl-dot.on{background:var(--accent);box-shadow:0 0 8px rgba(79,70,229,.3);}
.tl-co{font-size:14px;font-weight:600;}
.tl-role{font-size:12px;color:var(--text2);margin-top:2px;}
.tl-res{font-size:11px;color:var(--text3);margin-top:3px;}

/* SKILLS */
.skills{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
.sk{font-size:11px;color:var(--text2);background:var(--surface);border:.5px solid var(--border);border-radius:4px;padding:4px 10px;}

/* CASE DETAIL */
.back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:24px;transition:color var(--t);}
.back:hover{color:var(--text);}
.sar{display:flex;flex-direction:column;}
.sar-row{display:flex;gap:16px;padding:14px 0;border-bottom:.5px solid var(--border);}
.sar-row:last-child{border-bottom:none;}
.sar-l{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--green);width:18px;flex-shrink:0;padding-top:2px;letter-spacing:.06em;}
.sar-c{font-size:15px;color:var(--text2);line-height:1.75;}
.sar-c strong{color:var(--text);font-weight:600;}
.case-period,.case-skills{font-size:15px;color:var(--text2);margin-top:8px;line-height:1.6;}
.case-detail .block:not(.gallery-block) .tag{border-left:4px solid var(--green);padding-left:10px;font-size:17px;font-weight:600;}
.case-detail .block+.block{border-top:.5px solid var(--border);padding-top:40px;}
.case-detail .sar-row{border-bottom:none;padding:8px 0;}
.case-detail .sar-row:first-child{padding-top:0;}
.chart-box{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:20px 20px 12px;margin-top:8px;}
.kpi-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}

/* INSIGHTS LIST */
.ins-header{padding:52px 0 28px;}
.ins-cats{display:flex;align-items:center;border-bottom:.5px solid var(--border);margin-bottom:4px;}
.ins-cat{font-size:13px;padding:10px 16px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all var(--t);white-space:nowrap;}
.ins-cat:first-child{padding-left:0;}
.ins-cat.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.ins-search{margin-left:auto;display:flex;align-items:center;gap:6px;}
.ins-q{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text);background:transparent;width:0;transition:width .3s ease;padding:0;}
.ins-q.open{width:140px;border-bottom:.5px solid var(--border2);padding:2px 0;}
.ins-search-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--text2);display:flex;align-items:center;transition:color var(--t);}
.ins-search-btn:hover{color:var(--text);}
.art-list{display:flex;flex-direction:column;}
.art-row{display:flex;gap:24px;padding:28px 0;border-bottom:.5px solid var(--border);cursor:pointer;transition:opacity var(--t);}
.art-row:hover{opacity:.65;}
.art-body{flex:1;min-width:0;}
.art-cat{font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.art-title{font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.35;margin-bottom:8px;color:var(--text);}
.art-excerpt{font-size:13px;color:var(--text2);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.art-meta{font-size:11px;color:var(--text3);margin-top:12px;}
.art-img{width:96px;height:96px;flex-shrink:0;border-radius:var(--r-sm);overflow:hidden;background:var(--surface);}
.art-img img{width:100%;height:100%;object-fit:cover;display:block;}
.art-img-empty{width:100%;height:100%;background:var(--surface2);}

/* PAGINATION */
.pagination{display:flex;gap:4px;justify-content:center;margin-top:40px;}
.pg-btn{width:32px;height:32px;border-radius:var(--r-sm);border:.5px solid var(--border);background:none;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text2);transition:all var(--t);}
.pg-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.pg-btn:hover:not(.on){border-color:var(--border2);color:var(--text);}

/* INSIGHT DETAIL */
.ins-detail-header{padding:52px 0 0;}
.ins-detail-cat{font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;}
.ins-detail-title{font-size:clamp(26px,4vw,36px);font-weight:700;letter-spacing:-.03em;line-height:1.25;}
.ins-detail-sub{font-size:15px;color:var(--text2);margin-top:12px;line-height:1.7;}
.ins-detail-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text3);padding:20px 0;border-top:.5px solid var(--border);border-bottom:.5px solid var(--border);margin-top:28px;}
.ins-detail-body{padding:36px 0;font-size:15px;line-height:1.9;color:var(--text2);}
.ins-detail-body p{margin-bottom:20px;}
.ins-detail-body strong{color:var(--text);}
.ins-detail-body hr{border:none;border-top:.5px solid var(--border);margin:28px 0;}
.ins-detail-body blockquote{border-left:3px solid var(--accent);padding:12px 16px;margin:0 0 20px;background:var(--surface);border-radius:0 var(--r-sm) var(--r-sm) 0;color:var(--text2);}

/* PREV CARDS */
.prev-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.pcard{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color var(--t);}
.pcard:hover{border-color:var(--border2);}
.pt{font-size:13px;font-weight:600;}
.ps{font-size:12px;color:var(--text2);margin-top:3px;}

/* CONTACT */
.contact-h{padding:64px 0 20px;}
.ct-img-wrap{margin:0 0 0;border-radius:var(--r);overflow:hidden;}
.ct-img{width:100%;height:auto;display:block;border-radius:var(--r);}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:#111;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* GALLERY */
.gallery-block{margin-bottom:0;}
.gallery-img{width:100%;height:auto;display:block;border-radius:var(--r-sm);}
.gallery-wide .gallery-img{}
.gallery-two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start;}
.gallery-two-col .gallery-img{}
.gallery-three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-items:start;}
.gallery-three-col .gallery-img{}
.gallery-mixed-top .gallery-img{margin-bottom:8px;}
.gallery-mixed-bottom{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start;}
.gallery-mixed-bottom .gallery-img{}

/* LIGHTBOX */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s ease;}
.lb-overlay.open{opacity:1;pointer-events:auto;}
.lb-img-wrap{max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center;}
.lb-img-wrap img{max-width:90vw;max-height:90vh;width:auto;height:auto;object-fit:contain;border-radius:6px;display:block;box-shadow:0 8px 48px rgba(0,0,0,.6);transition:transform .22s ease;}
.lb-close{position:fixed;top:20px;right:24px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;z-index:9001;line-height:1;}
.lb-close:hover{background:rgba(255,255,255,.25);}
.gallery-img{cursor:zoom-in;}

/* FOOTER */
footer{text-align:center;padding:40px 0;font-size:11px;color:var(--text3);border-top:.5px solid var(--border);}

@media(max-width:520px){
  nav{padding:0 16px;}
  .w{padding:36px 16px 72px;}
  .metrics{grid-template-columns:repeat(3,1fr);}
  .mn{font-size:20px;}
  .row{flex-direction:column;}
  .btn{justify-content:center;}
  .art-img{width:72px;height:72px;}
  .art-title{font-size:15px;}
  .nav-links{gap:16px;}
}
</style>
</head>

function deepMerge(base, over) {
  if (!over || typeof over !== 'object') return base;
  const r = Array.isArray(base) ? [...base] : { ...base };
  for (const k of Object.keys(over)) {
    if (over[k] === null || over[k] === undefined) continue;
    if (Array.isArray(over[k])) { r[k] = over[k]; }
    else if (typeof over[k] === 'object' && base[k] && typeof base[k] === 'object' && !Array.isArray(base[k])) {
      r[k] = deepMerge(base[k], over[k]);
    } else { r[k] = over[k]; }
  }
  return r;
}

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const nl2br = s => esc(s).replace(/\n/g,'<br>');
const nl2brRaw = s => String(s||'').replace(/\n/g,'<br>');
function mdInline(s) {
  return s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/_(.*?)_/g,'<em>$1</em>');
}
const nl2p = s => s.split(/\n\n+/).map(p => {
  const t = p.trim();
  if (!t) return '';
  if (/^<img /i.test(t)) return t;
  if (t === '---') return '<hr>';
  if (t.startsWith('> ')) {
    const inner = t.split('\n').map(l => mdInline(esc(l.replace(/^> ?/,'')))).join('<br>');
    return `<blockquote>${inner}</blockquote>`;
  }
  return `<p>${mdInline(esc(t)).replace(/\n/g,'<br>')}</p>`;
}).join('');
function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────
function lbOpen(src, alt) {
  const ov = document.getElementById('lb-overlay');
  const im = document.getElementById('lb-img');
  im.src = src;
  im.alt = alt || '';
  ov.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function lbClose(e) {
  if (e && e.target === document.getElementById('lb-img')) return;
  const ov = document.getElementById('lb-overlay');
  ov.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { document.getElementById('lb-img').src = ''; }, 220);
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') lbClose(); });

// ── RENDER: GALLERY ───────────────────────────────────────────────────────
function imgTag(img) {
  return `<img class="gallery-img" src="${esc(img.src)}" alt="${esc(img.alt||'')}" onclick="lbOpen('${esc(img.src)}','${esc(img.alt||'')}')" loading="lazy">`;
}

function renderGallery(gallery) {
  if (!gallery || !gallery.length) return '';
  return gallery.map(block => {
    const imgs = (block.images || []).filter(img => img.src);
    if (!imgs.length) return '';
    const layout = block.layout || 'wide';
    let inner = '';
    if (layout === 'wide') {
      inner = `<div class="gallery-wide">${imgTag(imgs[0])}</div>`;
    } else if (layout === 'two-col') {
      inner = `<div class="gallery-two-col">${imgs.slice(0,2).map(imgTag).join('')}</div>`;
    } else if (layout === 'three-col') {
      inner = `<div class="gallery-three-col">${imgs.slice(0,3).map(imgTag).join('')}</div>`;
    } else if (layout === 'mixed') {
      inner = `<div class="gallery-mixed-top">${imgTag(imgs[0])}</div>
               <div class="gallery-mixed-bottom">${imgs.slice(1,3).map(imgTag).join('')}</div>`;
    }
    return `<div class="block gallery-block">${inner}</div>`;
  }).join('');
}

  <div class="back" onclick="go('work')">← Work</div>
  <div class="tag">CASE ${esc(c.id)}</div>

  <div class="divider"></div>
  ${kpisHtml}
  ${periodHtml}
  <div class="block">
    <div class="tag">상황·행동·결과</div>
    <div class="sar">
      <div class="sar-row"><div class="sar-l">S</div><div class="sar-c">${nl2brRaw(c.sar.s)}</div></div>
      <div class="sar-row"><div class="sar-l">A</div><div class="sar-c">${nl2brRaw(c.sar.a)}</div></div>
      <div class="sar-row"><div class="sar-l">R</div><div class="sar-c">${nl2brRaw(c.sar.r)}</div></div>

}

// ── RENDER: INSIGHTS PAGE SHELL ───────────────────────────────────────────
let insCat = '전체';
let insQuery = '';
let insPage = 1;
const INS_PER_PAGE = 8;
const INS_CATS = ['전체', '콘텐츠 전략', '상품 기획', '브랜드 운영'];

function renderInsights() {
  return `<div id="p-insights" class="page"><div class="w" id="ins-wrap"></div></div>`;
}

function renderInsightsContent() {
  const wrap = document.getElementById('ins-wrap');
  if (!wrap) return;
  const articles = (D.insights || []).filter(a => a.published !== false);
  const filtered = articles.filter(a => {
    const catOk = insCat === '전체' || a.category === insCat;
    const qOk = !insQuery || a.title.toLowerCase().includes(insQuery.toLowerCase());
    return catOk && qOk;
  });
  const totalPages = Math.max(1, Math.ceil(filtered.length / INS_PER_PAGE));
  insPage = Math.min(insPage, totalPages);
  const paged = filtered.slice((insPage-1)*INS_PER_PAGE, insPage*INS_PER_PAGE);
  wrap.innerHTML = `
    <div class="ins-header">
      <div class="tag">Insights</div>
      <h2>${nl2br((D.insightsPage||{}).title||'문제를 해결하며 배운 것들')}</h2>
      <p class="sub">${nl2br((D.insightsPage||{}).subtitle||'실무에서 맞다뜨린 문제와 해결 과정을 글로 기록합니다.')}</p>
    </div>
    <div class="ins-cats">
      ${INS_CATS.map(c => `<span class="ins-cat${insCat===c?' on':''}" onclick="setInsCat('${c}')">${esc(c)}</span>`).join('')}
      <div class="ins-search">
        <input type="text" id="ins-q" class="ins-q${insQuery?' open':''}" placeholder="검색" value="${esc(insQuery)}" autocomplete="off">
        <button class="ins-search-btn" onclick="toggleSearch()" title="검색">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </div>
    <div class="art-list">
      ${paged.length ? paged.map(a => `
      <div class="art-row" onclick="go('insight-${esc(a.id)}')">
        <div class="art-body">
          <div class="art-cat">${esc(a.category)}</div>
          <div class="art-title">${esc(a.title)}</div>
          <div class="art-excerpt">${esc(a.excerpt)}</div>
          <div class="art-meta">${fmtDate(a.date)} · by ${esc(a.author)}</div>
        </div>
        <div class="art-img">
          ${a.image ? `<img src="${esc(a.image)}" alt="">` : '<div class="art-img-empty"></div>'}
        </div>
      </div>`).join('') : '<div style="padding:48px 0;color:var(--text3);font-size:14px;text-align:center;">검색 결과가 없습니다.</div>'}
    </div>
    ${totalPages > 1 ? `
    <div class="pagination">
      ${Array.from({length:totalPages},(_,i)=>`<button class="pg-btn${insPage===i+1?' on':''}" onclick="setInsPage(${i+1})">${i+1}</button>`).join('')}
    </div>` : ''}
  `;
  _bindSearch();
}

function _bindSearch() {
  const el = document.getElementById('ins-q');
  if (!el || el._bound) return;
  el._bound = true;
  let composing = false;
  el.addEventListener('compositionstart', () => { composing = true; });
  el.addEventListener('compositionend', e => { composing = false; setInsQuery(e.target.value); });
  el.addEventListener('input', e => { if (!composing) setInsQuery(e.target.value); });
}
function setInsCat(cat) { insCat = cat; insPage = 1; renderInsightsContent(); }
function setInsPage(p) { insPage = p; renderInsightsContent(); window.scrollTo(0,52); }
function setInsQuery(q) { insQuery = q; insPage = 1; renderInsightsContent(); }
function toggleSearch() {
  const el = document.getElementById('ins-q');
  if (!el) return;
  el.classList.toggle('open');
  if (el.classList.contains('open')) { el.focus(); }
  else { insQuery = ''; el.value = ''; renderInsightsContent(); }
}

// ── RENDER: INSIGHT DETAIL ────────────────────────────────────────────────
function renderInsightDetail(a) {
  return `
<div id="p-insight-${esc(a.id)}" class="page">
<div class="w">
  <div class="back" onclick="go('insights')">← Insights</div>
  <div class="ins-detail-header">
    <div class="ins-detail-cat">${esc(a.category)}</div>
    <div class="ins-detail-title">${esc(a.title)}</div>
    ${a.excerpt ? `<div class="ins-detail-sub">${nl2br(a.excerpt)}</div>` : ''}
  </div>
  <div class="ins-detail-meta">
    <span>by ${esc(a.author)}</span>
    <span>${fmtDate(a.date)}</span>
  </div>
  <div class="ins-detail-body">${nl2p(a.content || '')}</div>
</div>
</div>`;
}

// ── RENDER: CONTACT ───────────────────────────────────────────────────────
function renderContact() {
  const ct = D.contact;
  return `

  <div class="contact-h">

    <h2>${nl2br(ct.title)}</h2>
    <div class="row">
      <button class="btn btn-p" onclick="copyEmail()">${ct.email ? '이메일 보내기' : '이메일 준비 중'}</button>
      <button class="btn btn-o" id="btn-resume" onclick="downloadResume()">이력서 PDF 다운로드</button>
    </div>
  </div>
  ${ct.image ? `<div class="ct-img-wrap"><img src="${ct.image === '__stored__' ? (localStorage.getItem('portfolio_contact_image') || '') : ct.image}" alt="프로필 이미지" class="ct-img"></div>` : ''}
  <div class="divider" style="margin:48px 0;"></div>
  <div class="block">
    <div class="tag">기타 경력</div>
    <div class="prev-list">
      ${ct.prevCareers.map(p => `
      <div class="pcard">
        <div class="pt">${esc(p.title)}</div>
        <div class="ps">${esc(p.desc)}</div>
      </div>`).join('')}
    </div>
  </div>
</div>
</div>`;

// ── TOAST & EMAIL COPY ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2500);
}

function initResumeBtn() {
  const btn = document.getElementById('btn-resume');
  if (!btn) return;
  const hasPdf = !!localStorage.getItem('portfolio_resume_pdf');
  if (hasPdf) {
    btn.disabled = false;
    btn.style.opacity = '';
    btn.style.cursor = '';
    btn.style.pointerEvents = '';
  } else {
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.style.cursor = 'not-allowed';
    btn.style.pointerEvents = 'none';
  }
}
function downloadResume() {
  const pdf = localStorage.getItem('portfolio_resume_pdf');
  if (!pdf) return;
  const rawName = (D.contact.resumeName || '이력서').trim();
  const name = rawName.endsWith('.pdf') ? rawName : rawName + '.pdf';
  const a = document.createElement('a');
  a.href = pdf;
  a.download = name;
  a.click();
}
function copyEmail() {
  if (!D.contact.email) return;
  navigator.clipboard.writeText(D.contact.email)
    .then(() => showToast('✓ 이메일이 복사되었습니다'))
    .catch(() => showToast('이메일: ' + D.contact.email));
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('nav-inner').innerHTML = renderNav();
document.getElementById('main').innerHTML =
  renderWork() +
  D.cases.map(renderCaseDetail).join('') +
  renderInsights() +
  (D.insights || []).map(renderInsightDetail).join('') +
  renderContact();
document.getElementById('footer').innerHTML = `© 2026 ${esc(D.name)} · AI 코딩 툴로 직접 제작`;

// ── NAVIGATION ────────────────────────────────────────────────────────────
const NAV_MAP = {
  work:'n-work',
  'case-01':'n-work','case-02':'n-work','case-03':'n-work',
  insights:'n-insights',
  contact:'n-contact'
};

function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('on'));
  const pg = document.getElementById('p-' + id);
  if (pg) pg.classList.add('on');
  const nk = NAV_MAP[id] || (id.startsWith('insight-') ? 'n-insights' : null);
  if (nk) { const n = document.getElementById(nk); if (n) n.classList.add('on'); }
  location.hash = id;
  window.scrollTo(0, 0);
  if (id === 'work') { runCounters(); startMotionCounter(); }
  if (id === 'insights') renderInsightsContent();
  if (id === 'contact') initResumeBtn();
}

// ── MOTION BANNER COUNTER ─────────────────────────────────────────────────
let mbCounted = false;
function startMotionCounter() {
  if (mbCounted) return; mbCounted = true;
  const kv = Math.max(1, Number((D.motionBanner||{}).kpiValue) || 131);
  const dur = 1600, delay = 300;
  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
  let start = null;
  function tick(ts) {
    if (!start) start = ts;
    const elapsed = ts - start - delay;
    if (elapsed < 0) { requestAnimationFrame(tick); return; }
    const t = Math.min(elapsed / dur, 1);
    const el = document.getElementById('mb-num');
    if (el) el.textContent = '+' + Math.round(easeOut(t) * kv) + '%';
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── COUNTERS ──────────────────────────────────────────────────────────────
let counted = false;
function runCounters() {
  if (counted) return; counted = true;
  D.metrics.forEach((m, i) => {
    if (!m.animate) return;
    const el = document.getElementById('cnt' + i);
    if (!el) return;
    const numMatch = String(m.value).match(/([\d.]+)/);
    if (!numMatch) return;
    const target = parseFloat(numMatch[1]);
    const prefix = String(m.value).slice(0, numMatch.index);
    const suffix = String(m.value).slice(numMatch.index + numMatch[0].length);
    const dur = 1200 + i * 200;
    let s = 0, step = target / (dur / 16);
    const isInt = Number.isInteger(target);
    const tick = () => {
      s = Math.min(s + step, target);
      el.textContent = prefix + (isInt ? Math.floor(s) : s.toFixed(2)) + suffix;
      if (s < target) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

// ── START ─────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const hash = location.hash.replace('#', '') || 'work';
  go(hash);
});
window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#', '') || 'work';
  go(hash);
});
</script>
